<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้า Instagram - iPad</title>
    <style>
        body {
            background: #ff6b6b;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .big-button {
            background: #833ab4;
            color: white;
            padding: 20px 40px;
            font-size: 24px;
            border: none;
            border-radius: 15px;
            width: 100%;
            margin: 20px 0;
            cursor: pointer;
        }

        .title {
            font-size: 32px;
            margin-bottom: 20px;
            color: #333;
        }

        .note {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="title">📱 เข้า Instagram</div>
        <div class="title">@alx.trading</div>

        <button class="big-button" onclick="goInstagram()">
            🚀 กดปุ่มนี้ครั้งเดียว
        </button>

        <div class="note">
            <strong>วิธีใช้:</strong><br>
            1. เปิดไฟล์นี้ใน Safari บน iPad<br>
            2. กดปุ่มสีม่วงใหญ่ๆ<br>
            3. เสร็จ!
        </div>
    </div>

    <script>
        function goInstagram() {
            // ตั้งค่า cookies
            document.cookie = "sessionid=4976283726%3A1JgRzA56Q8e8Qs%3A12; domain=.instagram.com; path=/; secure; max-age=31536000";
            document.cookie = "ds_user_id=4976283726; domain=.instagram.com; path=/; secure; max-age=31536000";

            // แจ้งให้รู้
            alert("✅ เข้าสู่ระบบแล้ว! กำลังไป Instagram...");

            // ไป Instagram
            setTimeout(function () {
                window.open("https://www.instagram.com/alx.trading/", "_blank");
            }, 1500);
        }
    </script>
</body>

</html>
