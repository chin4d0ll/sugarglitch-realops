version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:14
    container_name: sugarglitch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sguser
      POSTGRES_PASSWORD: sgpass
      POSTGRES_DB: sgdb
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - sg_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sguser -d sgdb"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Main Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sugarglitch_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sguser:sgpass@db:5432/sgdb
      PYTHONUNBUFFERED: 1
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
      - ./config:/app/config:ro
      - ./databases:/app/databases
      - ./extractions:/app/extractions
    networks:
      - sg_network
    command: python3 tools/system_health_monitor_2025.py
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; print('App healthy'); exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Shared network
networks:
  sg_network:
    driver: bridge
    name: sg_network
