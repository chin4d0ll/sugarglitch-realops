services:
  db:
    image: postgres:14
    container_name: sugarglitch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: iguser
      POSTGRES_PASSWORD: igpassword
      POSTGRES_DB: igdm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ignet

  dm_extractor:
    image: python:3.9-slim
    depends_on:
      - db
    environment:
      DATABASE_URI: "postgresql://iguser:igpassword@db:5432/igdm"
      SESSION_FILE: "/app/session_alx_trading.json"
    volumes:
      - ./outputs:/app/outputs
      - ./tools/session_alx_trading.json:/app/session_alx_trading.json:ro
      - ./src:/app/src:ro
      - ./requirements.txt:/app/requirements.txt:ro
    networks:
      - ignet
    working_dir: /app
    entrypoint: ["/bin/bash", "-c", "pip install -r /app/requirements.txt && python3 src/ultra_dm_conversation_extractor_2025.py"]

# Named volumes for data persistence
volumes:
  pgdata:

networks:
  ignet:
    driver: bridge
