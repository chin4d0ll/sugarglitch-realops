allow-lan: true
dns:
  default-nameserver:
  - 223.5.5.5
  - 114.114.114.114
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  ipv6: false
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
external-controller: 127.0.0.1:9090
log-level: info
mode: rule
port: 7890
proxies:
- alterId: 16
  cipher: auto
  name: OpenTunnel-1
  network: ws
  port: 443
  server: www.bing.com
  tls: true
  type: vmess
  uuid: 4f17e173-4af9-5041-9662-f6c27e0decfd
  ws-opts:
    headers:
      Host: usv-4.openv2ray.com
    path: /opentunnel?user=opentunnel.net-chin4d0ll
proxy-groups:
- name: 🔥 OpenTunnel
  proxies:
  - ♻️ Auto
  - 🎯 Manual
  type: select
- interval: 300
  name: ♻️ Auto
  proxies: &id001
  - OpenTunnel-1
  type: url-test
  url: http://www.gstatic.com/generate_204
- name: 🎯 Manual
  proxies: *id001
  type: select
rules:
- DOMAIN-SUFFIX,local,DIRECT
- IP-CIDR,127.0.0.0/8,DIRECT
- IP-CIDR,172.16.0.0/12,DIRECT
- IP-CIDR,192.168.0.0/16,DIRECT
- IP-CIDR,10.0.0.0/8,DIRECT
- GEOIP,CN,DIRECT
- MATCH,🔥 OpenTunnel
socks-port: 7891
